<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List</title>

    <link rel="stylesheet" href="../css/student.css">
    <link rel="stylesheet" href="../css/theme.css">
</head>
<body>

    <header>
        <h1>Student Management Portal</h1>

        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="student.html">Add Student</a>
            <a href="student-list.html">Student List</a>
            <a href="profile.html">Profile</a>
            <a href="attendance.html">Attendance</a>
        </nav>

        <button type="button" id="logoutButton">Logout</button>
    </header>

    <main>
        <section class="list-box">

            <div class="list-heading">
                <h2 style="color:blue;font-size: 30px;">Student List</h2>

           <button style="background-color:cornsilk; width:10%; height:30px;"><a href="student.html" class="add-student-button">
                    Student
                </a></button><br><br>
            </div>

            <div class="list-controls" style="width:20%;">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by Student ID or Name"
                ><br><br>

                <select id="departmentFilter">
                    <option value="All">All Departments</option>
                    <option value="CSE">CSE</option>
                    <option value="ECE">ECE</option>
                    <option value="EEE">EEE</option>
                    <option value="BCA">BCA</option>
                </select><br><br>

                <select id="sortSelect">
                    <option value="">Sort Students</option>
                    <option value="nameAZ">Name: A to Z</option>
                    <option value="nameZA">Name: Z to A</option>
                    <option value="idLowHigh">Student ID: Low to High</option>
                    <option value="idHighLow">Student ID: High to Low</option>
                </select>
            </div><br><br>

            <div class="table-container">
                <table border="1" style="width:60%;height:300px;font-weight: bold;">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Mobile</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="studentTableBody"></tbody>
                </table>
            </div><br><br>

            <div class="pagination">
                <button type="button" id="previousButton" style="width:10%; color:black; background-color:cadetblue;height:30px">Previous</button>

                <span id="pageNumber">Page 1 of 1</span>

                <button type="button" id="nextButton" style="width:10%; color:black; background-color:cadetblue;height:30px">Next</button>
            </div>

        </section>
    </main>

    <script src="../js/theme.js"></script>
    <script src="../js/student-list.js"></script>
</body>
</html>
