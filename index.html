<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management Portal - Login</title>

    <!-- CSS file -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="../css/theme.css">

    <!-- Eye icon library -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >
</head>
<body>
<h1>Student Management Portal</h1>
    <div class="login-page">

        <div class="login-box">

            
            <p class="login-subtitle"></p>

            <form id="loginForm">

                <!-- Username -->
                <div class="form-group">
                    <label for="username" style="color:white;font-size: 30px;">Username</label>

                    <input
                        type="text"
                        id="username"
                        placeholder="Enter username"
                        autocomplete="username"
                    >

                    <small id="usernameError"></small>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password" style="color:white;font-size: 30px;">Password</label>

                    <div class="password-box">
                        <input
                            type="password"
                            id="password"
                            placeholder="Enter password"
                            autocomplete="current-password"
                        >

                        <button
                            type="button"
                            id="showPassword"
                            class="eye-button"
                            aria-label="Show or hide password"
                        >
                            <i class="fa-solid fa-eye-slash"></i>
                        </button>
                    </div>

                    <small id="passwordError"></small>
                </div>

                <!-- Remember me -->
                <label class="remember" style="color:black;font-size: 30px; font-weight: bold;">
                    <input type="checkbox" id="rememberMe">
                    Remember Me
                </label>

                <!-- Login -->
                <button type="submit" class="login-button">
                    Login
                </button>

            </form>


        </div>

    </div>

    <!-- JavaScript files: order must not change -->


    <script src="../js/theme.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/validation.js"></script>
    <script src="./js/app.js"></script>
 

</body>
</html>
