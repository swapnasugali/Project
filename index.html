<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Management Portal</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Login Section -->

  <div class="container" id="loginBox">
    <div class="icon"></div>


<h1>Student Portal</h1>
<p class="subtitle">Login to manage student details</p>

<form id="loginForm">
  <label for="username">Username</label>
  <input type="text" id="username" placeholder="Enter username">

  <label for="password">Password</label>
  <div class="password-row">
    <input type="password" id="password" placeholder="Enter password">
    <button type="button" class="show-button" id="showButton">Show</button>
  </div>

  <div class="remember-row">
    <input type="checkbox" id="rememberMe">
    <span>Remember Me</span>
  </div>

  <p id="message"></p>

  <button type="submit" class="login-button">Login</button>
</form>

<div class="demo">
  Username: <b>admin</b><br>
  Password: <b>admin123</b>
</div>


  </div>

  <!-- Dashboard Section -->

  <div class="container dashboard hidden" id="dashboardBox">
    <div class="icon">🎉</div>

<h2>Login Successful</h2>
<p id="welcomeText"></p>

<p>You are now on the dashboard page.</p>

<button class="logout-button" id="logoutButton">Logout</button>


  </div>

  <script src="app.js"></script>

</body>
</html>
